name: Frontend

on:
  push:
    branches: [main]
    paths:
    - 'frontend/**'
    - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
    - 'frontend/**'
    - '.github/workflows/frontend.yml'

defaults:
  run:
    working-directory: frontend

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Typecheck
      run: npm run typecheck

    - name: Lint
      run: npm run lint

    - name: Test
      run: npm test
